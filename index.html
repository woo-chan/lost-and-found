<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분실물 찾기</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>분실물 찾기</h1>
            <div class="auth-box">
                <div id="logged-out-area">
                    <button id="google-login-btn" class="google-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.66c-.55 2.92-2.19 5.39-4.67 7.05l7.24 5.61C43.51 36.19 46.5 30.73 46.5 24z"/>
                            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.24-5.61c-2.11 1.41-4.8 2.26-8.65 2.26-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        <span>구글로 로그인</span>
                    </button>
                </div>
                
                <div id="logged-in-area" class="auth-logged" style="display: none;">
                    <span id="user-info" class="user-info"></span>
                    <button id="logout-btn" class="auth-btn">로그아웃</button>
                    <button id="open-modal-btn" class="open-btn">분실물 등록하기</button>
                </div>
            </div>
        </header>

        <section class="filter-section">
            <div class="category-buttons">
                <button class="btn active" data-category="all">전체</button>
                <button class="btn" data-category="wallet">지갑 · 카드</button>
                <button class="btn" data-category="electronics">전자기기</button>
                <button class="btn" data-category="jewelry">액세서리</button>
                <button class="btn" data-category="cosmetics">화장품</button>
                <button class="btn" data-category="others">기타</button>
            </div>
        </section>

        <section class="controls-section">
            <div id="pagination-top" class="pagination"></div>
            <div class="view-toggles">
                <button id="view-grid-btn" class="view-btn active">카드 보기</button>
                <button id="view-list-btn" class="view-btn">목록 보기</button>
            </div>
        </section>

        <section class="list-section">
            <h2>
                분실물 목록 
                <span id="count-total" class="count-badge">전체 0</span>
                <span id="count-claimed" class="count-badge">완료 0</span>
            </h2>
            <div id="item-list" class="item-list grid">
                <p class="no-data">등록된 분실물이 없습니다.</p>
            </div>
            <div id="pagination-bottom" class="pagination"></div>
        </section>

        <div id="lost-item-modal" class="modal">
            <div class="modal-content">
                <span id="close-modal-btn" class="close-btn">&times;</span>
                <h2>새 분실물 등록</h2>
                <form id="lost-item-form">
                    <div class="form-group">
                        <label for="item-category">카테고리 (필수)</label>
                        <select id="item-category" required>
                            <option value="" disabled selected>카테고리를 선택해 주세요</option>
                            <option value="wallet">지갑 · 카드</option>
                            <option value="electronics">전자기기</option>
                            <option value="jewelry">목걸이, 반지, 팔찌 등</option>
                            <option value="cosmetics">화장품</option>
                            <option value="others">기타</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="item-name">물품명 (필수)</label>
                        <input type="text" id="item-name" placeholder="예: 검은색 가죽 지갑" required>
                    </div>

                    <div class="form-group">
                        <label for="item-location">습득 장소 (필수)</label>
                        <input type="text" id="item-location" placeholder="예: 2학년 3반 교실" required>
                    </div>

                    <div class="form-group">
                        <label>사진 첨부 (최대 3개, 필수)</label>
                        <div id="custom-file-trigger" class="custom-file-box">
                            <span id="file-count-preview">예: 사진 업로드 (클릭하여 선택)</span>
                            <span class="upload-icon">📁</span>
                        </div>
                        <input type="file" id="item-images" accept="image/*" multiple required style="display: none;">
                    </div>

                    <button type="submit" class="submit-btn">등록하기</button>
                </form>
            </div>
        </div>

        <div id="image-lightbox-modal" class="lightbox-modal" onclick="closeImageLightbox()">
            <span class="lightbox-close">&times;</span>
            <div class="lightbox-content" onclick="event.stopPropagation()">
                <div id="lightbox-images-container" class="lightbox-slider"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
